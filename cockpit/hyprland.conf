# 🎮 The Underground Cockpit — Hyprland config (Phase 1: bring-up)
# Installed by cockpit/install.sh as ~/.config/hypr/hyprland.conf (symlink).
# Plan: docs/COCKPIT_PLAN.md

# ── GPU ──────────────────────────────────────────────────────────────────────
# Monitor is on the NVIDIA RTX 5060 Ti (pci 01:00.0). Pin the compositor to it
# by stable PCI path (card numbers swap across reboots — card0/card1 are NOT
# stable on this box).
env = AQ_DRM_DEVICES,/dev/dri/by-path/pci-0000:01:00.0-card
# NVIDIA-on-Wayland flags (driver 595):
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

# FALLBACK if NVIDIA bring-up misbehaves: move the monitor cable to a
# motherboard port (AMD iGPU, pci 0c:00.0) and swap the pin to:
#   env = AQ_DRM_DEVICES,/dev/dri/by-path/pci-0000:0c:00.0-card
# (comment out the three NVIDIA env lines; games still render on NVIDIA via PRIME)

cursor {
    no_hardware_cursors = true   # required on NVIDIA
}

# ── Output ───────────────────────────────────────────────────────────────────
monitor = ,preferred,auto,1

# ── Layout: game is master (left, 68%), Ember is the stack (right, 32%) ─────
general {
    layout = master
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    # Phase 1 placeholder colours; soul-red/gold theming lands in Phase 3
    col.active_border = rgba(c80000ee)
    col.inactive_border = rgba(444444aa)
}

master {
    mfact = 0.68
    new_status = master   # launched last, the game takes the big pane
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

# ── Window rules (Hyprland ≥0.53 block syntax) ──────────────────────────────
# Undertale under Proton
windowrule {
    name = tile-undertale
    match:class = ^(steam_app_391540)$
    tile = true
}

# Ember kiosk. Chrome IGNORES --class on Wayland — the app window's class is
# derived from the URL: "chrome-127.0.0.1__-Default" (verified in a nested run).
# Keep ember-kiosk in the regex too for the XWayland/X11 case where --class works.
windowrule {
    name = tile-ember-kiosk
    match:class = ^(ember-kiosk|chrome-127\.0\.0\.1__.*)$
    tile = true
}

# Steam client itself is noise: park it on workspace 2, don't steal focus
windowrule {
    name = park-steam-client
    match:class = ^(steam)$
    workspace = 2 silent
}

# ── Autostart ────────────────────────────────────────────────────────────────
exec-once = ~/undertale-vera/cockpit/cockpit-start.sh

# ── Keys (NOTE: owner's R key is dead — no binds may require R) ─────────────
$mod = SUPER

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Full-game / Full-Ember: fullscreen whichever pane is focused (Phase-1 stand-in
# for the 3-mode cycle that lands in Phase 4)
bind = $mod, F, fullscreen, 0

bind = $mod, Q, killactive
bind = $mod, T, exec, ptyxis        # escape-hatch terminal
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2        # where the Steam client is parked
bind = $mod SHIFT, M, exit          # leave the cockpit back to the login screen
