name: CI

# The wall, enforced on every change. Parser-truth helpers, the two-bucket wall,
# route honesty, and the grounded-chat endpoints are all covered by pytest — this
# makes that suite a merge gate instead of an honour system.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a rapid push series doesn't queue up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: syntax + pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Core runtime only — the test suite mocks the LLM and the RAG layer
          # falls back to a pure keyword retriever, so the heavy vector deps
          # (requirements-rag.txt) are deliberately NOT installed in CI.
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check
        run: python -m py_compile *.py backend/*.py

      - name: Run tests
        # Anthropic key is never needed: every chat test mocks generate_reply.
        env:
          ANTHROPIC_API_KEY: ""
        run: pytest -q

      - name: Adversarial wall gate
        # Red-teams the two-bucket wall: every baited fabrication must be caught
        # and no grounded reply false-flagged. Must hold at 100%.
        run: python -m tools.voice_eval --min 1.0

      - name: Lore retrieval gate
        # recall@k over the lore corpus on the deterministic keyword backend.
        run: python -m tools.lore_eval --min 1.0

  frontend:
    name: frontend smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Start the app
        # No live model in CI: the LLM host is unreachable (fast connection-refused),
        # so chat serves its grounded deterministic fallback — which the smoke asserts.
        env:
          UNDERTALE_VERA_BACKEND: ollama
          OLLAMA_HOST: http://127.0.0.1:9
          UNDERTALE_VERA_DB: sqlite:///./smoke.db
          ANTHROPIC_API_KEY: ""
        run: |
          python -m uvicorn undertale_vera_app:app --host 127.0.0.1 --port 9092 &
          for i in $(seq 1 40); do curl -sf http://127.0.0.1:9092/ >/dev/null && break; sleep 1; done

      - name: Frontend smoke
        # Drives the real UI headlessly: every view, chat, Sound Test, master mute,
        # an easter egg, and zero console/page errors. The front end's merge gate.
        env:
          SMOKE_BASE: http://127.0.0.1:9092
        run: python tools/frontend_smoke.py
